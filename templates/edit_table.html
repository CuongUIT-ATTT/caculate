{% extends 'layout.html' %}

{% block title %}Chỉnh sửa giao dịch - Thu Chi Pro{% endblock %}

{% block content %}
<div class="fade-in">
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
        <h2 style="margin: 0; font-size: 1.5rem;">Kiểm tra & Chỉnh sửa: <span style="font-weight: 400; color: var(--text-secondary);">{{ source_pdf }}</span></h2>
        <a href="/" class="btn btn-outline" style="font-size: 0.875rem;">
            <i data-lucide="x"></i> Hủy bỏ
        </a>
    </div>

    <!-- Quick Options -->
    <div class="card">
        <form id="tableForm" method="post">
            <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <div class="form-group">
                    <label for="person_tbl">Đối tượng tính</label>
                    <input id="person_tbl" name="person" value="{{ person }}">
                </div>
                <div class="form-group">
                    <label for="paid_on_tbl">Ngày trả gần nhất</label>
                    <input id="paid_on_tbl" name="paid_on" value="{{ paid_on }}" type="date">
                </div>
                <div class="form-group">
                    <label for="start_tbl">Ngày bắt đầu tính</label>
                    <input id="start_tbl" name="start" value="{{ start }}" type="date">
                </div>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button type="button" class="btn btn-primary" id="addRowBtn">
                    <i data-lucide="plus-circle"></i> Thêm dòng mới
                </button>
                <button type="button" class="btn btn-outline" id="clearEmptyBtn">
                    <i data-lucide="trash"></i> Xóa dòng trống
                </button>
            </div>

            <!-- Table Editor -->
            <div class="table-container" style="margin-top: 2rem;">
                <table id="editTable">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Ngày</th>
                            <th style="width: 25%;">Danh mục</th>
                            <th style="width: 35%;">Ghi chú</th>
                            <th class="amount" style="width: 15%;">Số tiền</th>
                            <th style="width: 10%;">Gỡ bỏ</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in records %}
                        <tr>
                            <td><input name="date[]" value="{{ r['Date'] }}" style="padding: 0.4rem; font-size: 0.85rem;"></td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <div class="cat-badge" style="width: 1.5rem; height: 1.5rem; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem;"></div>
                                    <select class="category-select" name="category[]" data-initial="{{ r['Category name'] }}" style="padding: 0.4rem; font-size: 0.85rem; flex: 1;"></select>
                                </div>
                            </td>
                            <td><textarea name="note[]" style="padding: 0.4rem; font-size: 0.85rem; min-height: 2.5rem; vertical-align: middle;">{{ r['Note'] }}</textarea></td>
                            <td class="amount"><input name="amount[]" value="{{ r['Amount'] }}" style="text-align: right; font-family: monospace; font-weight: 600; padding: 0.4rem; font-size: 0.85rem;"></td>
                            <td style="text-align: center;">
                                <button type="button" class="btn-del" style="background: none; border: none; color: var(--error); cursor: pointer;">
                                    <i data-lucide="trash-2" style="width: 1.25rem;"></i>
                                </button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <!-- Global Actions -->
            <div style="margin-top: 3rem; display: flex; justify-content: flex-end; gap: 1rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
                <button formaction="/table/export" formmethod="post" class="btn btn-outline">
                    <i data-lucide="download"></i> Tải xuống CSV
                </button>
                <button formaction="/table/compute" formmethod="post" class="btn btn-primary" style="padding: 0.75rem 2.5rem;">
                    <i data-lucide="check-check"></i> Xác nhận & Xem báo cáo
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    (function () {
        const tbl = document.getElementById("editTable");
        const addBtn = document.getElementById("addRowBtn");
        const clearBtn = document.getElementById("clearEmptyBtn");

        const incomeCategories = ["Business", "Extra Income", "Gifts", "Insurance Payout", "Khác", "Loan", "Other", "Parental Leave", "Salary"];
        const expenseCategories = ["Ăn uống chung với Quân", "Beauty", "Bills & Fees", "Car", "Education", "Entertainment", "Family & Personal", "Food & Drink", "Gifts", "Groceries", "Healthcare", "Home", "Khác", "Other", "Shopping", "Sport & Hobbies", "Transport", "Travel", "Work"];

        function populateCategories(sel, initial) {
            sel.innerHTML = '<option value="">-- Chọn danh mục --</option>';
            const iGroup = document.createElement("optgroup"); iGroup.label = "THU NHẬP";
            incomeCategories.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; iGroup.appendChild(o); });
            const eGroup = document.createElement("optgroup"); eGroup.label = "CHI PHÍ";
            expenseCategories.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; eGroup.appendChild(o); });
            sel.appendChild(iGroup); sel.appendChild(eGroup);
            if (initial) sel.value = initial;
        }

        function initRow(tr) {
            const sel = tr.querySelector(".category-select");
            if (sel) populateCategories(sel, sel.dataset.initial);
            lucide.createIcons();
            
            const delBtn = tr.querySelector(".btn-del");
            delBtn && delBtn.addEventListener("click", () => tr.remove());
        }

        document.querySelectorAll("#editTable tbody tr").forEach(initRow);

        addBtn && addBtn.addEventListener("click", () => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input name="date[]" style="padding: 0.4rem; font-size: 0.85rem;"></td>
                <td>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <div class="cat-badge" style="width: 1.5rem; height: 1.5rem; border-radius: 50%; background: #e2e8f0;"></div>
                        <select class="category-select" name="category[]" style="padding: 0.4rem; font-size: 0.85rem; flex: 1;"></select>
                    </div>
                </td>
                <td><textarea name="note[]" style="padding: 0.4rem; font-size: 0.85rem; min-height: 2.5rem;"></textarea></td>
                <td class="amount"><input name="amount[]" style="text-align: right; font-family: monospace; font-weight: 600; padding: 0.4rem; font-size: 0.85rem;"></td>
                <td style="text-align: center;">
                    <button type="button" class="btn-del" style="background: none; border: none; color: var(--error); cursor: pointer;">
                        <i data-lucide="trash-2" style="width: 1.25rem;"></i>
                    </button>
                </td>
            `;
            tbl.tBodies[0].appendChild(tr);
            initRow(tr);
        });

        clearBtn && clearBtn.addEventListener("click", () => {
             Array.from(tbl.tBodies[0].rows).forEach(r => {
                if (!Array.from(r.querySelectorAll("input, textarea")).some(i => i.value.trim())) r.remove();
             });
        });
    })();
</script>
{% endblock %}
